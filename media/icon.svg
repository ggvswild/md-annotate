<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgS" x1="0" y1="0" x2="0" y2="128" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1C3A2E"/>
      <stop offset="1" stop-color="#10271E"/>
    </linearGradient>
    <radialGradient id="bodyS" cx="0.42" cy="0.32" r="0.85">
      <stop stop-color="#A8E66A"/>
      <stop offset="0.6" stop-color="#6FCB52"/>
      <stop offset="1" stop-color="#3FA63E"/>
    </radialGradient>
  </defs>

  <!-- backdrop -->
  <rect width="128" height="128" rx="28" fill="url(#bgS)"/>

  <!-- antennae with buds -->
  <path d="M52 36 C49 24 47 18 44 13" stroke="#2F7A33" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M76 36 C79 24 81 18 84 13" stroke="#2F7A33" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="43" cy="11" r="6" fill="#FFD96B" stroke="#2F7A33" stroke-width="2.5"/>
  <circle cx="85" cy="11" r="6" fill="#FFD96B" stroke="#2F7A33" stroke-width="2.5"/>

  <!-- leaf on top -->
  <path d="M64 30 C58 18 60 8 70 4 C76 14 74 26 64 30 Z"
        fill="#7FD45A" stroke="#2F7A33" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M66 26 C68 18 69 12 70 7" stroke="#2F7A33" stroke-width="2" stroke-linecap="round"/>

  <!-- body -->
  <ellipse cx="64" cy="74" rx="38" ry="36" fill="url(#bodyS)" stroke="#2F7A33" stroke-width="3.5"/>

  <!-- belly patch -->
  <ellipse cx="64" cy="86" rx="20" ry="17" fill="#EAF7CB" opacity="0.85"/>

  <!-- cheeks -->
  <circle cx="37" cy="78" r="8" fill="#FF8FA8"/>
  <circle cx="91" cy="78" r="8" fill="#FF8FA8"/>

  <!-- eyes -->
  <ellipse cx="51" cy="66" rx="9" ry="11" fill="#23402A"/>
  <ellipse cx="77" cy="66" rx="9" ry="11" fill="#23402A"/>
  <circle cx="54" cy="62" r="3.2" fill="#FFFFFF"/>
  <circle cx="80" cy="62" r="3.2" fill="#FFFFFF"/>

  <!-- mouth -->
  <path d="M58 78 Q64 84 70 78" stroke="#23402A" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- little feet -->
  <ellipse cx="50" cy="108" rx="10" ry="6" fill="#3FA63E" stroke="#2F7A33" stroke-width="2.5"/>
  <ellipse cx="78" cy="108" rx="10" ry="6" fill="#3FA63E" stroke="#2F7A33" stroke-width="2.5"/>
</svg>
